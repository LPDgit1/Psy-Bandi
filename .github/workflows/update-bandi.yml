name: Aggiorna archivio bandi

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5,17 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-bandi.yml"
      - "backend/app/importers/**"
      - "backend/app/services/**"
      - "backend/app/scripts/build_public_snapshot.py"
      - "backend/app/*catalog.py"
      - "backend/app/source_catalog.py"
      - "backend/requirements.txt"

permissions:
  contents: write

concurrency:
  group: update-bandi-main
  cancel-in-progress: true

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v5

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Aggiorna e pubblica lo snapshot pubblico
        env:
          PYTHONPATH: backend
          PYTHONUNBUFFERED: "1"
          CATALOG_SOURCES_PER_RUN: "50"
          CATALOG_ADAPTER_BUDGET_SECONDS: "240"
          TARGET_HEALTH_SOURCES_PER_RUN: "15"
          TARGET_HEALTH_BUDGET_SECONDS: "360"
          DEEP_ADAPTER_SOURCES_PER_RUN: "12"
          DEEP_ADAPTER_BUDGET_SECONDS: "900"
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "::group::Tentativo di aggiornamento ${attempt}/3"
            git fetch origin main
            git reset --hard origin/main

            python -m pip install --disable-pip-version-check -r backend/requirements.txt
            python -m app.scripts.build_public_snapshot --output data/bandi.sqlite

            git add --force data/bandi.sqlite
            if git diff --cached --quiet; then
              echo "Nessuna variazione nei dati pubblici."
              echo "::endgroup::"
              exit 0
            fi

            git commit -m "Aggiorna archivio pubblico bandi"
            if git push origin HEAD:main; then
              echo "::endgroup::"
              exit 0
            fi

            echo "::endgroup::"
            echo "::warning::origin/main è cambiato durante il tentativo ${attempt}/3; lo snapshot verrà ricostruito sulla versione più recente."
          done

          echo "::error::Pubblicazione non riuscita dopo 3 ricostruzioni dello snapshot."
          exit 1
