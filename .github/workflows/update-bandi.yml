name: Aggiorna archivio bandi

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5,17 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-bandi.yml"
      - "backend/app/importers/**"
      - "backend/app/services/**"
      - "backend/app/scripts/build_public_snapshot.py"
      - "backend/app/*catalog.py"
      - "backend/app/source_catalog.py"
      - "backend/requirements.txt"

permissions:
  contents: write

concurrency:
  group: update-bandi-main
  cancel-in-progress: true

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 80

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v5

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installa le dipendenze
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Aggiorna e valida lo snapshot pubblico
        env:
          PYTHONPATH: backend
          PYTHONUNBUFFERED: "1"
          CATALOG_SOURCES_PER_RUN: "50"
          CATALOG_ADAPTER_BUDGET_SECONDS: "240"
          TARGET_HEALTH_SOURCES_PER_RUN: "15"
          TARGET_HEALTH_BUDGET_SECONDS: "360"
          DEEP_ADAPTER_SOURCES_PER_RUN: "12"
          DEEP_ADAPTER_BUDGET_SECONDS: "900"
        run: python -m app.scripts.build_public_snapshot --output data/bandi.sqlite

      - name: Pubblica lo snapshot se è cambiato
        run: |
          git add --force data/bandi.sqlite
          if git diff --cached --quiet; then
            echo "Nessuna variazione nei dati pubblici."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Aggiorna archivio pubblico bandi"
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "::error::Impossibile riallineare lo snapshot con origin/main."
              exit 1
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Il branch remoto e' cambiato durante il push; nuovo tentativo ${attempt}/3."
          done
          echo "::error::Pubblicazione dello snapshot non riuscita dopo 3 tentativi."
          exit 1
